<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>佛山地铁AI训练师培训优惠抽奖</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Helvetica Neue', sans-serif; }
        body { background: linear-gradient(145deg, #f093fb 0%, #f5576c 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; padding: 16px; }
        .card { background: rgba(255, 255, 255, 0.95); width: 100%; max-width: 420px; border-radius: 48px; padding: 32px 24px; box-shadow: 0 30px 50px rgba(0,0,0,0.3); backdrop-filter: blur(10px); text-align: center; }
        h2 { margin: 0 0 8px; color: #1e293b; font-weight: 700; font-size: 32px; }
        .subtitle { color: #475569; margin-bottom: 24px; font-size: 16px; }
        .info-bar { background: #eef2ff; color: #4f46e5; padding: 14px; border-radius: 40px; font-size: 18px; font-weight: 600; margin: 16px 0 24px; }
        input { width: 100%; padding: 16px 20px; border: 2px solid #e2e8f0; border-radius: 40px; font-size: 16px; outline: none; margin-bottom: 16px; background: white; transition: 0.2s; }
        input:focus { border-color: #f5576c; box-shadow: 0 0 0 3px rgba(245,87,108,0.2); }
        button { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; border: none; width: 100%; padding: 18px; border-radius: 40px; font-size: 20px; font-weight: 700; letter-spacing: 1px; box-shadow: 0 10px 20px rgba(245,87,108,0.4); transition: 0.2s; margin: 8px 0 20px; cursor: pointer; }
        button:disabled { opacity: 0.5; pointer-events: none; background: #cbd5e1; box-shadow: none; }
        .result-area { margin: 16px 0 8px; font-size: 32px; font-weight: 800; min-height: 70px; padding: 10px; }
        .win-1 { color: #b45309; } .win-2 { color: #1e40af; } .win-3 { color: #047857; } .win-4 { color: #6b21a8; } .win-5 { color: #b91c1c; } .lose { color: #4b5563; }
        .prize-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 20px 0; background: #f1f5f9; padding: 20px; border-radius: 32px; }
        .prize-item { background: white; padding: 8px 18px; border-radius: 40px; font-size: 16px; font-weight: 600; color: #0f172a; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .prize-item span { color: #f5576c; font-weight: 700; margin-left: 4px; }
        .error-msg { color: #b91c1c; font-size: 14px; margin: -8px 0 16px; text-align: left; padding-left: 16px; }
        .footer { color: #64748b; font-size: 14px; margin-top: 24px; border-top: 1px dashed #cbd5e1; padding-top: 20px; }
    </style>
    <!-- 引入 CloudBase SDK -->
    <script src="https://cdn.bootcdn.net/ajax/libs/cloudbase-js-sdk/2.0.0/cloudbase.min.js"></script>
</head>
<body>
<div class="card">
    <h2>🎁 幸运大抽奖</h2>
    <div class="subtitle">先到先得</div>
    <div class="info-bar" id="countDisplay">加载剩余名额...</div>

    <input type="text" id="name" placeholder="姓名" autocomplete="off">
    <input type="tel" id="mobile" placeholder="手机号码" maxlength="11" autocomplete="off">
    <div id="errorMsg" class="error-msg"></div>

    <button id="drawBtn">点击抽奖</button>

    <div id="result" class="result-area"></div>

    <div class="prize-grid">
        <div class="prize-item">一等奖 <span id="p1">1</span></div>
        <div class="prize-item">二等奖 <span id="p2">2</span></div>
        <div class="prize-item">三等奖 <span id="p3">6</span></div>
        <div class="prize-item">四等奖 <span id="p4">8</span></div>
        <div class="prize-item">五等奖 <span id="p5">20</span></div>
    </div>
    <div class="footer">每人仅限一次 · 扫码参与</div>
</div>

<script>
    // ---------- 替换成你的 CloudBase 环境 ID ----------
    const ENV_ID = 'lottery-app-5g5kseta183ad0df'; // 例如 lottery-app-123abc
    // -------------------------------------------------

    // 初始化 CloudBase
    const app = cloudbase.init({
        env: ENV_ID
    });

    // 匿名登录（无需用户授权）
    app.auth().anonymousAuthProvider().signIn().then(() => {
        console.log('登录成功');
    });

    // 获取DOM元素
    const nameInput = document.getElementById('name');
    const mobileInput = document.getElementById('mobile');
    const drawBtn = document.getElementById('drawBtn');
    const resultDiv = document.getElementById('result');
    const countDisplay = document.getElementById('countDisplay');
    const errorMsg = document.getElementById('errorMsg');
    const prizeSpans = {
        p1: document.getElementById('p1'),
        p2: document.getElementById('p2'),
        p3: document.getElementById('p3'),
        p4: document.getElementById('p4'),
        p5: document.getElementById('p5')
    };

    let isSubmitting = false;

    // 页面加载时刷新统计数据
    refreshStats();

    drawBtn.addEventListener('click', async function() {
        if (isSubmitting) return;

        const name = nameInput.value.trim();
        const mobile = mobileInput.value.trim();

        if (!name) { showError('请输入姓名'); return; }
        if (!mobile) { showError('请输入手机号'); return; }
        if (!/^1\d{10}$/.test(mobile)) { showError('手机号格式不正确'); return; }

        hideError();
        isSubmitting = true;
        drawBtn.disabled = true;
        resultDiv.innerHTML = '';

        try {
            // 调用云函数
            const res = await app.callFunction({
                name: 'lottery',
                data: { name, mobile }
            });

            const result = res.result;
            
            if (result.code !== 200) {
                // 业务错误（手机号重复、名额已满等）
                showError(result.msg);
                drawBtn.disabled = false; // 重新启用按钮
            } else {
                // 抽奖成功，显示结果
                const prize = result.data.prize;
                if (prize === '谢谢参与') {
                    resultDiv.innerHTML = '<span class="lose">😢 谢谢参与</span>';
                } else {
                    let className = '';
                    if (prize.includes('一')) className = 'win-1';
                    else if (prize.includes('二')) className = 'win-2';
                    else if (prize.includes('三')) className = 'win-3';
                    else if (prize.includes('四')) className = 'win-4';
                    else if (prize.includes('五')) className = 'win-5';
                    resultDiv.innerHTML = `<span class="${className}">🎉 恭喜获得 ${prize} ！</span>`;
                }

                // 刷新统计数据
                await refreshStats();

                // 输入框禁用，防止再次提交
                nameInput.disabled = true;
                mobileInput.disabled = true;
                // 按钮保持禁用
            }
        } catch (err) {
            console.error(err);
            showError('网络错误，请稍后重试');
            drawBtn.disabled = false;
        } finally {
            isSubmitting = false;
        }
    });

    // 刷新统计数据：剩余人数、各奖项剩余数量
    async function refreshStats() {
        try {
            // 获取数据库引用
            const db = app.database();
            
            // 查询总人数
            const totalRes = await db.collection('participants').count();
            const totalCount = totalRes.total || 0;
            const remaining = Math.max(0, 300 - totalCount);
            countDisplay.innerText = `剩余名额：${remaining} / 300`;

            // 查询各奖项数量
            const prizeLevels = ['一等奖', '二等奖', '三等奖', '四等奖', '五等奖'];
            const totals = [1, 2, 6, 8, 20];
            
            for (let i = 0; i < prizeLevels.length; i++) {
                const prizeRes = await db.collection('participants')
                    .where({ prize: prizeLevels[i] })
                    .count();
                const count = prizeRes.total || 0;
                const remainingPrizes = totals[i] - count;
                prizeSpans[`p${i+1}`].innerText = remainingPrizes >= 0 ? remainingPrizes : 0;
            }
        } catch (e) {
            console.warn('刷新统计失败', e);
        }
    }

    function showError(msg) {
        errorMsg.innerText = msg;
    }
    function hideError() {
        errorMsg.innerText = '';
    }
</script>
</body>
</html>
